project: fkn
description: Function Kit Nextgen

tasks:
  fmt:
    desc: Format Go files
    cmd: gofmt -w .
    agent: false

  test:
    desc: Run the Go test suite
    cmd: go test ./...

  build:
    desc: Build the fkn binary
    cmd: go build -o bin/fkn ./cmd/fkn

  check:
    desc: Run the default local verification pipeline
    scope: cli
    steps:
      - fmt
      - test
      - build

guards:
  default:
    steps:
      - test
      - build

scopes:
  cli:
    - cmd/fkn/
    - internal/config/
    - internal/context/
    - internal/prompt/
    - internal/runner/
    - internal/guard/
    - internal/scope/

prompts:
  continue-cli:
    desc: Continue work on the fkn CLI
    template: |
      Continue building the CLI on branch {{git_branch}}.
      OS: {{os}}
      Timestamp: {{timestamp}}
      Scope: {{scope.cli}}
      Check task: {{task.check.desc}}
      Latest diff:
      {{git_diff}}
      Unknown variable should remain: {{unknown_var}}

context:
  file_tree: true
  git_log_lines: 10
  git_diff: false
  dependencies: true
  agent_files:
    - README.md
  include:
    - README.md
    - cmd/
    - internal/
    - fkn.yaml
  exclude:
    - .git/
    - .idea/
    - bin/
  caps:
    file_tree_entries: 80
    file_lines: 80
    git_diff_lines: 120
    agent_file_lines: 120

serve:
  transport: stdio
  port: 8080
  token_env: FKN_MCP_TOKEN

watch:
  debounce_ms: 500
  paths:
    - README.md
    - cmd/
    - internal/
    - fkn.yaml
