project: fkn
description: Function Kit Nextgen

tasks:
  fmt:
    desc: Format Go files
    cmd: gofmt -w .
    agent: false

  test:
    desc: Run the Go test suite
    cmd: go test ./...

  build:
    desc: Build the fkn binary
    cmd: go build -o bin/fkn ./cmd/fkn

  check:
    desc: Run the default local verification pipeline
    steps:
      - fmt
      - test
      - build

guards:
  default:
    steps:
      - test
      - build

scopes:
  cli:
    - cmd/fkn/
    - internal/config/
    - internal/prompt/
    - internal/runner/
    - internal/guard/
    - internal/scope/

prompts:
  continue-cli:
    desc: Continue work on the fkn CLI
    template: |
      Continue building the CLI on branch {{git_branch}}.
      OS: {{os}}
      Timestamp: {{timestamp}}
      Scope: {{scope.cli}}
      Check task: {{task.check.desc}}
      Latest diff:
      {{git_diff}}
      Unknown variable should remain: {{unknown_var}}
